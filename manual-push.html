<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manual push</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #f5f1ee;
        color: #111;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: #feeb29;
        border-radius: 16px;
        padding: 28px;
        border: 2px solid rgba(17,17,17,0.15);
        box-shadow: 0 18px 40px rgba(0,0,0,0.12);
        text-align: center;
      }
      h1 { margin: 0 0 6px; font-size: 1.25rem; }
      .sub-count {
        font-size: 0.85rem;
        margin-bottom: 20px;
        opacity: 0.75;
      }
      .sub-count strong { opacity: 1; }
      button {
        width: 100%;
        padding: 14px 20px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
        border-radius: 999px;
        background: #111;
        color: #feeb29;
      }
      button:hover:not(:disabled) { background: #2a2a2a; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      pre {
        margin: 18px 0 0;
        text-align: left;
        font-size: 11px;
        line-height: 1.45;
        padding: 12px;
        background: rgba(255,255,255,0.55);
        border-radius: 8px;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-word;
        min-height: 40px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Manual push</h1>
      <p class="sub-count" id="subCount">Loading subscriber count…</p>
      <button type="button" id="sendBtn">Send push notification</button>
      <pre id="status">&nbsp;</pre>
    </div>

    <script>
      const BACKEND = "https://push-notification-78s4.onrender.com";
      const sendBtn  = document.getElementById("sendBtn");
      const statusEl = document.getElementById("status");
      const subCount = document.getElementById("subCount");

      async function loadHealth() {
        try {
          const res = await fetch(`${BACKEND}/api/health`);
          const data = await res.json();
          subCount.innerHTML = `Active subscribers: <strong>${data.subscriptions}</strong>`;
          if (data.subscriptions === 0) {
            subCount.innerHTML += " — no one subscribed yet";
          }
        } catch (e) {
          subCount.textContent = "Could not reach backend.";
        }
      }

      async function send() {
        sendBtn.disabled = true;
        statusEl.textContent = "Sending…";
        try {
          const res = await fetch(`${BACKEND}/api/send-notification`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              title: "Antivirus Scanner",
              body: "Virus scan completed successfully.",
              icon: "/111.png",
              count: 1,
            }),
          });
          const data = await res.json().catch(() => ({ parseError: true }));
          statusEl.textContent = `HTTP ${res.status}\n` + JSON.stringify(data, null, 2);
          await loadHealth();
        } catch (err) {
          statusEl.textContent = "Fetch error:\n" + err;
        } finally {
          sendBtn.disabled = false;
        }
      }

      sendBtn.addEventListener("click", send);
      loadHealth();
    </script>
  </body>
</html>
